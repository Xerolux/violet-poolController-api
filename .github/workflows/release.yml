name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version_mode:
        description: Version mode
        required: true
        type: choice
        options:
          - auto-patch
          - auto-minor
          - auto-major
          - custom
        default: auto-patch
      custom_version:
        description: Custom version when mode is custom, for example 1.2.3
        required: false
        type: string
        default: ""
      changelog:
        description: Optional notes prepended to the generated release notes
        required: false
        type: string
        default: ""
  release:
    types: [published]

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  dev-release:
    name: Publish development pre-release
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    concurrency:
      group: development-release
      cancel-in-progress: true

    steps:
      - name: Checkout tested revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Determine development version
        id: version
        run: >-
          python .github/scripts/release_version.py dev
          --run-number "${{ github.run_number }}"

      - name: Build and validate distributions
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Replace development pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEV_TAG: ${{ steps.version.outputs.dev_tag }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          while IFS= read -r old_tag; do
            [ -z "$old_tag" ] && continue
            gh release delete "$old_tag" --yes --cleanup-tag
          done < <(
            gh release list --limit 100 --json tagName,isPrerelease \
              --jq '.[] | select(.isPrerelease and (.tagName | contains("-dev."))) | .tagName'
          )

          wheel=$(find dist -maxdepth 1 -name "*.whl" -printf "%f\n" -quit)
          notes=$(cat <<EOF
          Automated development build from commit ${HEAD_SHA}.

          Install the wheel directly from this pre-release:

          \`\`\`bash
          pip install "https://github.com/${GITHUB_REPOSITORY}/releases/download/${DEV_TAG}/${wheel}"
          \`\`\`
          EOF
          )

          args=(
            --prerelease
            --target "$HEAD_SHA"
            --title "${DEV_TAG}"
            --notes "$notes"
            --generate-notes
          )
          if [ -n "$PREVIOUS_TAG" ]; then
            args+=(--notes-start-tag "$PREVIOUS_TAG")
          fi
          gh release create "$DEV_TAG" dist/* "${args[@]}"

  prepare-stable:
    name: Prepare stable release draft
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    concurrency:
      group: stable-release
      cancel-in-progress: false
    env:
      VERSION_MODE: ${{ inputs.version_mode }}
      CUSTOM_VERSION: ${{ inputs.custom_version }}
      RELEASE_NOTES: ${{ inputs.changelog }}

    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Determine and apply release version
        id: version
        run: >-
          python .github/scripts/release_version.py stable
          --mode "$VERSION_MODE"
          --custom "$CUSTOM_VERSION"

      - name: Install build tools
        run: python -m pip install build ruff twine ".[test]"

      - name: Run release checks
        run: |
          python -m ruff check violet_poolcontroller_api tests .github/scripts
          python -m pytest -q tests
          smoke_output=$(python tests/test_api_smoke.py --user admin --password secret)
          printf '%s\n' "$smoke_output"
          grep -q "FAIL: 0" <<< "$smoke_output"
          python -m build
          python -m twine check dist/*
          git diff --check

      - name: Commit and tag release
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml setup.py
          git commit -m "chore: release ${TAG}"
          git tag --annotate "$TAG" --message "$TAG"
          git push --atomic origin HEAD:main "$TAG"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        run: |
          args=(--draft --verify-tag --title "$TAG" --generate-notes)
          if [ -n "$PREVIOUS_TAG" ]; then
            args+=(--notes-start-tag "$PREVIOUS_TAG")
          fi
          if [ -n "$RELEASE_NOTES" ]; then
            args+=(--notes "$RELEASE_NOTES")
          fi
          gh release create "$TAG" dist/* "${args[@]}"

  publish-pypi:
    name: Publish stable release to PyPI
    if: github.event_name == 'release' && github.event.release.prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Download and validate release distributions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir dist
          gh release download "$TAG" --dir dist --pattern "*.whl" --pattern "*.tar.gz"
          python -m pip install twine
          python -m twine check dist/*
          python - <<'PY'
          import re
          import os
          from pathlib import Path

          content = Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'(?m)^version\s*=\s*"(\d+\.\d+\.\d+)"', content)
          if match is None or f"v{match.group(1)}" != os.environ["TAG"]:
              raise SystemExit("Release tag does not match pyproject.toml")
          PY

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
