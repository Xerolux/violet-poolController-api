name: CI

on:
  push:
    branches: [main]
    paths:
      - "violet_poolcontroller_api/**"
      - "tests/**"
      - "pyproject.toml"
      - "tox.ini"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "violet_poolcontroller_api/**"
      - "tests/**"
      - "pyproject.toml"
      - "tox.ini"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
        tox-env: ["py312", "py314"]
        exclude:
          - python-version: "3.12"
            tox-env: "py314"
          - python-version: "3.14"
            tox-env: "py312"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Run tox (${{ matrix.tox-env }})
        run: tox -e ${{ matrix.tox-env }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Run lint
        run: tox -e lint
