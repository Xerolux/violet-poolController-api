name: CI

on:
  push:
    branches: [main]
    paths:
      - "violet_poolcontroller_api/**"
      - "tests/**"
      - "pyproject.toml"
      - "setup.py"
      - ".github/scripts/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  pull_request:
    branches: [main]
    paths:
      - "violet_poolcontroller_api/**"
      - "tests/**"
      - "pyproject.toml"
      - "setup.py"
      - ".github/scripts/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  quality:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Run lint checks
        run: python -m ruff check violet_poolcontroller_api tests .github/scripts

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
          - python-version: "3.13"
          - python-version: "3.14"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run test suite
        run: python -m pytest -q tests

  smoke:
    name: API smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run full mock-server smoke test
        run: |
          smoke_output=$(python tests/test_api_smoke.py --user admin --password secret)
          printf '%s\n' "$smoke_output"
          grep -q "FAIL: 0" <<< "$smoke_output"

  package:
    name: Build package
    needs: [quality, test, smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build and validate distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
