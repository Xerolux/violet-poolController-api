name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pages:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy-pages:
    name: Deploy GitHub Pages
    needs: build-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  sync-wiki:
    name: Sync GitHub Wiki
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      group: github-wiki
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Clone GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_TERMINAL_PROMPT: "0"
        run: |
          git clone \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" \
            /tmp/wiki

      - name: Synchronize documentation
        run: rsync -av --delete --exclude ".git" docs/ /tmp/wiki/

      - name: Commit and push changes
        working-directory: /tmp/wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes detected."
            exit 0
          fi
          git commit -m "docs: sync wiki from docs folder [skip ci]"
          git push origin HEAD
