<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Violet Pool Controller API Docs</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8f4;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --link: #0f766e;
      --border: #d6e2dd;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(160deg, #effaf8 0%, var(--bg) 100%);
      color: var(--text);
    }
    main {
      max-width: 760px;
      margin: 4rem auto;
      padding: 0 1.25rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 14px 34px rgba(20, 63, 56, 0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 1.9rem;
    }
    p {
      line-height: 1.6;
      color: var(--muted);
    }
    ul {
      line-height: 1.8;
      padding-left: 1.25rem;
    }
    a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Violet Pool Controller API Documentation</h1>
      <p>
        Welcome. This Pages site is published from the <code>docs/</code> directory.
        For full documentation navigation, use one of the links below.
      </p>
      <ul>
        <li><a href="https://github.com/Xerolux/violet-poolController-api/wiki">Open GitHub Wiki</a></li>
        <li><a href="https://github.com/Xerolux/violet-poolController-api">Open Repository</a></li>
        <li><a href="../README.md">Open README</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
